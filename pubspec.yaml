name: jordan_tour
description: "A new Flutter project for Jordan Tourism."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.1
  audioplayers: ^5.2.1
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ajloun.webp
    - assets/aqaba.webp
    - assets/jerash.webp
    - assets/petra.webp
    - assets/Rum.webp
    - assets/video.mp4
    - assets/clap sound.mp3
    - assets/success sound.mp3